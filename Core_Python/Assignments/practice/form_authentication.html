<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="form_validation.js"></script>
</head>
<body> 
    <form method="post" id="reg_form">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" onblur="is_user_valid()"> <span id="username_error"></span>
        <br>
        <br>
        <label for="password">Password:</label> 
        <input type="password" id="password" name="password" onblur="is_password_valid()"> <span id="password_error"></span>
        <br>
        <br>
        <label for="course">Courses:</label>
        <input type="checkbox" class="course" name="course" value="c++">
        <label for="course">c++</label>
        <input type="checkbox" class="course" name="course" value="java">
        <label for="course">java</label>
        <input type="checkbox" class="course" name="course" value="python">
        <label for="course">python</label>
        <input type="checkbox" class="course" name="course" value="php">
        <label for="course">php</label> <span id="course_error"></span>
        <br>
        <br>
        <label for="gender">Gender:</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="other" name="gender" value="other">
        <label for="other">Other</label> <span id="gender_error"></span>
        <br>
        <br>
        <input type="checkbox" id="terms" name="terms" required>
        <label for="terms">I agree to the terms and conditions</label>
        <span id="terms_error"></span>    
        <br>
        <br>
        <input type="submit" value="submit" onclick="form_validationnn()">

    </form>
</body>
</html>
